---
- name: Install web package
  ansible.builtin.apt:
    name: "{{ web_package }}"
    state: present
    update_cache: true

- name: Enable mod_rewrite
  ansible.builtin.apache2_module:
    name: rewrite
    state: present
  notify: Restart web service

- name: Ensure web service running
  ansible.builtin.service:
    name: "{{ web_service }}"
    state: started
    enabled: true
