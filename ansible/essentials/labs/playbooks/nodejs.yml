---
- name: Install Node.js 20.x
  hosts: webservers
  become: true
  vars_files:
    - ../vault/secrets.yml
  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Add NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.gpg
        mode: "0644"

    - name: Add NodeSource repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
        filename: nodesource
        state: present

    - name: Install nodejs
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Show token length (uses vault var)
      ansible.builtin.debug:
        msg: "api_token length is {{ api_token | length }}"
