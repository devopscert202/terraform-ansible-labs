---
- name: Fixed handler notify
  hosts: webservers
  become: true
  tasks:
    - name: Deploy config
      ansible.builtin.copy:
        content: "worker_processes 2;\n"
        dest: /etc/nginx/nginx.conf
      notify: Restart nginx

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
