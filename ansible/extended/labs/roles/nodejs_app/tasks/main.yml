---
- name: Install Node.js prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.gpg
    mode: "0644"

- name: Configure NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Create application directory
  ansible.builtin.file:
    path: /opt/{{ nodejs_app_name }}
    state: directory
    owner: "{{ nodejs_app_user }}"
    group: "{{ nodejs_app_user }}"
    mode: "0755"

- name: Deploy application
  ansible.builtin.template:
    src: app.js.j2
    dest: /opt/{{ nodejs_app_name }}/app.js
    owner: "{{ nodejs_app_user }}"
    group: "{{ nodejs_app_user }}"
    mode: "0644"
  notify: Restart nodejs app

- name: Deploy systemd unit
  ansible.builtin.template:
    src: nodejs-app.service.j2
    dest: /etc/systemd/system/{{ nodejs_app_name }}.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart nodejs app

- name: Enable application service
  ansible.builtin.systemd:
    name: "{{ nodejs_app_name }}"
    enabled: true
    state: started
    daemon_reload: true
