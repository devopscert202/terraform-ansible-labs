---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Ensure lab marker file exists
  ansible.builtin.copy:
    content: "configured_by=ansible-extended\nrole=common\n"
    dest: /etc/ansible-lab-common
    mode: "0644"
