---
# Handlers and notify patterns (Lesson 5 AP-05)
- name: Configure nginx with handlers
  hosts: webservers
  become: true
  vars:
    nginx_worker_processes: 2
  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true

    - name: Deploy nginx configuration
      ansible.builtin.template:
        src: nginx-lab.conf.j2
        dest: /etc/nginx/sites-available/lab.conf
        mode: "0644"
        validate: nginx -t -c /etc/nginx/nginx.conf
      notify: Reload nginx

    - name: Enable lab site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/lab.conf
        dest: /etc/nginx/sites-enabled/lab.conf
        state: link
      notify: Reload nginx

    - name: Remove default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure nginx is started
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Force handler flush for validation
      ansible.builtin.meta: flush_handlers

    - name: Verify nginx responds locally
      ansible.builtin.uri:
        url: http://127.0.0.1/
        return_content: true
      register: nginx_response
      changed_when: false

    - name: Show response snippet
      ansible.builtin.debug:
        msg: "{{ nginx_response.content[:80] }}..."

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
