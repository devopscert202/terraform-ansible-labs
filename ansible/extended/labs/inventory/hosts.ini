# Replace private IPs with your lab environment (Ubuntu 22.04)
[webservers]
web1 ansible_host=10.0.1.10
web2 ansible_host=10.0.1.11

[appservers]
app1 ansible_host=10.0.1.12

[webservers:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3

[appservers:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
